<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Antonio Parmezan</title>

  <link rel="icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    .container {
      margin-top: 8vh;
      padding: 0 20px;
    }

    img.profile {
      width: 200px;
      max-width: 40vw;
      height: auto;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #333;
    }

    h1 {
      margin-top: 20px;
      font-size: clamp(22px, 4vw, 32px);
    }

    p {
      color: #555;
      font-size: clamp(14px, 2.5vw, 18px);
      margin: 10px auto;
      max-width: 500px;
    }

    .links {
      margin-top: 25px;
    }

    .links a {
      display: inline-block;
      margin: 8px;
      text-decoration: none;
      color: white;
      background-color: #333;
      padding: 10px 15px;
      border-radius: 5px;
      transition: 0.3s;
      font-size: clamp(14px, 2.5vw, 16px);
    }

    .links a:hover {
      background-color: #555;
    }

    @media (max-width: 480px) {
      img.profile {
        width: 160px;
      }

      .container {
        margin-top: 6vh;
      }
    }
  </style>
</head>

<body>
  <div class="container">
  
    <img src="profile.jpg" alt="Profile Photo" class="profile">

    <h1>Antonio Parmezan</h1>
